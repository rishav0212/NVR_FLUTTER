# Lowering to 3GB to prevent the OS from killing the process
org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
# Keep daemon false for now since it's crashing
org.gradle.daemon=false

# Forces Gradle to only run one heavy task at a time, drastically saving RAM
org.gradle.workers.max=1
kotlin.incremental=+